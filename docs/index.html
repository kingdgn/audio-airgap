<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>音频离线接收器</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --ink: #172326;
      --muted: #617074;
      --line: #d6dedf;
      --accent: #0f766e;
      --accent-dark: #0b5f59;
      --ok: #067647;
      --bad: #b42318;
      --warn: #b54708;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    header {
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
    }
    main {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
      max-width: 1180px;
      margin: 0 auto;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 700;
    }
    label {
      display: block;
      margin: 10px 0 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    input, select, button, textarea {
      width: 100%;
      font: inherit;
    }
    input, select, textarea {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
    }
    textarea {
      min-height: 118px;
      resize: vertical;
      font-family: Consolas, ui-monospace, monospace;
      font-size: 12px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 12px;
      color: #fff;
      background: var(--accent);
      font-weight: 700;
      cursor: pointer;
      min-height: 42px;
    }
    button.secondary { background: #526166; }
    button.danger { background: var(--bad); }
    button:disabled {
      opacity: .55;
      cursor: wait;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfb;
      min-height: 78px;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: 22px;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .warn { color: var(--warn); }
    .bar {
      height: 10px;
      background: #e5ecec;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 12px;
    }
    .bar > div {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width .2s ease;
    }
    .audio-panel {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfb;
    }
    .audio-panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    .level-meter {
      height: 12px;
      margin-top: 10px;
      border-radius: 99px;
      background: #e5ecec;
      overflow: hidden;
    }
    .level-meter > div {
      height: 100%;
      width: 0%;
      background: #8aa0a3;
      transition: width .08s linear, background .12s ease;
    }
    .level-meter.active > div { background: var(--accent); }
    canvas {
      display: block;
      width: 100%;
      height: 120px;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0f172a;
    }
    .statusline {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      align-items: center;
    }
    .actions a, .actions button {
      width: auto;
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      border-radius: 6px;
      padding: 9px 12px;
    }
    .actions a {
      color: #fff;
      background: var(--accent-dark);
      font-weight: 700;
    }
    pre {
      margin: 12px 0 0;
      border-radius: 8px;
      padding: 12px;
      background: #111827;
      color: #e5e7eb;
      overflow: auto;
      max-height: 280px;
      font-size: 12px;
    }
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; padding: 10px; }
      .metrics { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <h1>音频离线接收器</h1>
  </header>
  <main>
    <section>
      <h2>录音接收</h2>
      <div class="row">
        <div>
          <label for="channels">并行通道</label>
          <select id="channels">
            <option value="12" selected>12 稳定</option>
            <option value="16">16 更快</option>
            <option value="20">20 最快</option>
            <option value="8">8 保守</option>
          </select>
        </div>
        <div>
          <label for="symbolMs">符号时长 ms</label>
          <select id="symbolMs">
            <option value="10" selected>10</option>
            <option value="20">20</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="threshold">调制音阈值</label>
          <input id="threshold" type="number" value="0.012" min="0.001" max="0.2" step="0.001">
        </div>
        <div>
          <label for="searchMs">对齐搜索 ms</label>
          <input id="searchMs" type="number" value="120" min="0" max="200" step="5">
        </div>
      </div>
      <div class="buttons">
        <button id="startBtn" type="button">开始</button>
        <button id="stopBtn" class="danger" type="button" disabled>停止</button>
      </div>
      <button id="resetBtn" class="secondary" type="button">重置状态</button>
      <label for="missingText">缺失片段序号</label>
      <textarea id="missingText" readonly></textarea>
      <div class="actions">
        <button id="copyMissingBtn" class="secondary" type="button">复制缺片列表</button>
        <button id="downloadRecordingBtn" class="secondary" type="button" disabled>下载录音 WAV</button>
        <button id="downloadDiagBtn" class="secondary" type="button">下载诊断 JSON</button>
      </div>
    </section>
    <section>
      <h2>接收状态</h2>
      <div class="metrics">
        <div class="metric"><span>录音状态</span><strong id="recordingState">待机</strong></div>
        <div class="metric"><span>有效帧</span><strong id="validFrames">0</strong></div>
        <div class="metric"><span>已接收</span><strong id="received">0/0</strong></div>
        <div class="metric"><span>SHA256</span><strong id="shaState">-</strong></div>
        <div class="metric"><span>录音缓存</span><strong id="recordedTime">0s</strong></div>
      </div>
      <div class="bar"><div id="progressBar"></div></div>
      <div class="audio-panel">
        <div class="audio-panel-head">
          <span>音频输入</span>
          <span id="audioLevelText">无输入</span>
        </div>
        <div id="levelMeter" class="level-meter"><div id="levelBar"></div></div>
        <canvas id="waveCanvas" width="720" height="180"></canvas>
      </div>
      <div id="statusLine" class="statusline">准备就绪。</div>
      <div id="downloadActions" class="actions"></div>
      <pre id="log"></pre>
    </section>
  </main>

  <script>
    const MAGIC = [0x41, 0x4f, 0x44, 0x31]; // AOD1
    const VERSION = 1;
    const FRAME_MANIFEST = 1;
    const FRAME_DATA = 2;
    const PILOT_HZ = 880;
    const PILOT_MS = 180;
    const BLOCK_MS = 10;
    const END_GAP_MS = 100;

    let audioContext = null;
    let stream = null;
    let processor = null;
    let zeroGain = null;
    let pending = [];
    let pendingLength = 0;
    let active = false;
    let segment = [];
    let segmentLength = 0;
    let inactiveSamples = 0;
    let decoding = Promise.resolve();
    let decodeEpoch = 0;
    let recordedChunks = [];
    let recordedLength = 0;
    let recordedSampleRate = 48000;
    let recordingDownloadUrl = null;
    let diagDownloadUrl = null;
    const rx = {
      manifest: null,
      dataByFile: new Map(),
      validFrames: 0,
      badSegments: 0,
      seenFrameKeys: new Set(),
      downloadUrl: null
    };

    const els = {
      startBtn: document.getElementById("startBtn"),
      stopBtn: document.getElementById("stopBtn"),
      resetBtn: document.getElementById("resetBtn"),
      copyMissingBtn: document.getElementById("copyMissingBtn"),
      downloadRecordingBtn: document.getElementById("downloadRecordingBtn"),
      downloadDiagBtn: document.getElementById("downloadDiagBtn"),
      channels: document.getElementById("channels"),
      symbolMs: document.getElementById("symbolMs"),
      threshold: document.getElementById("threshold"),
      searchMs: document.getElementById("searchMs"),
      recordingState: document.getElementById("recordingState"),
      validFrames: document.getElementById("validFrames"),
      received: document.getElementById("received"),
      shaState: document.getElementById("shaState"),
      recordedTime: document.getElementById("recordedTime"),
      progressBar: document.getElementById("progressBar"),
      audioLevelText: document.getElementById("audioLevelText"),
      levelMeter: document.getElementById("levelMeter"),
      levelBar: document.getElementById("levelBar"),
      waveCanvas: document.getElementById("waveCanvas"),
      statusLine: document.getElementById("statusLine"),
      missingText: document.getElementById("missingText"),
      downloadActions: document.getElementById("downloadActions"),
      log: document.getElementById("log")
    };

    const crcTable = (() => {
      const table = new Uint32Array(256);
      for (let i = 0; i < 256; i++) {
        let c = i;
        for (let k = 0; k < 8; k++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
        table[i] = c >>> 0;
      }
      return table;
    })();

    function crc32(bytes) {
      let c = 0xffffffff;
      for (let i = 0; i < bytes.length; i++) c = crcTable[(c ^ bytes[i]) & 0xff] ^ (c >>> 8);
      return (c ^ 0xffffffff) >>> 0;
    }

    function tonePlan(channels) {
      const plan = [];
      for (let ch = 0; ch < channels; ch++) {
        const base = 1000 + ch * 600;
        plan.push([base, base + 100, base + 200, base + 300]);
      }
      return plan;
    }

    function concatFloat32(parts, totalLength) {
      const out = new Float32Array(totalLength);
      let offset = 0;
      for (const part of parts) {
        out.set(part, offset);
        offset += part.length;
      }
      return out;
    }

    function pushPending(input) {
      const copy = new Float32Array(input.length);
      copy.set(input);
      pending.push(copy);
      pendingLength += copy.length;
    }

    function shiftPending(count) {
      const out = new Float32Array(count);
      let filled = 0;
      while (filled < count && pending.length) {
        const first = pending[0];
        const need = count - filled;
        if (first.length <= need) {
          out.set(first, filled);
          filled += first.length;
          pending.shift();
          pendingLength -= first.length;
        } else {
          out.set(first.subarray(0, need), filled);
          pending[0] = first.subarray(need);
          pendingLength -= need;
          filled += need;
        }
      }
      return out;
    }


    function formatDuration(seconds) {
      const s = Math.max(0, Math.floor(seconds));
      const m = Math.floor(s / 60);
      const r = s % 60;
      return m ? `${m}m ${String(r).padStart(2, "0")}s` : `${r}s`;
    }

    function resetRecordingBuffer() {
      if (recordingDownloadUrl) URL.revokeObjectURL(recordingDownloadUrl);
      if (diagDownloadUrl) URL.revokeObjectURL(diagDownloadUrl);
      recordedChunks = [];
      recordedLength = 0;
      recordedSampleRate = audioContext ? audioContext.sampleRate : 48000;
      recordingDownloadUrl = null;
      diagDownloadUrl = null;
      updateRecordingUi();
    }

    function updateRecordingUi() {
      const seconds = recordedSampleRate ? recordedLength / recordedSampleRate : 0;
      els.recordedTime.textContent = formatDuration(seconds);
      els.downloadRecordingBtn.disabled = recordedLength <= 0;
    }

    function recordInput(input) {
      const pcm = new Int16Array(input.length);
      for (let i = 0; i < input.length; i++) {
        const sample = Math.max(-1, Math.min(1, input[i]));
        pcm[i] = sample < 0 ? Math.round(sample * 32768) : Math.round(sample * 32767);
      }
      recordedChunks.push(pcm);
      recordedLength += pcm.length;
      updateRecordingUi();
    }

    function writeAscii(view, offset, text) {
      for (let i = 0; i < text.length; i++) view.setUint8(offset + i, text.charCodeAt(i));
    }

    function buildRecordedWavBlob() {
      const byteLength = recordedLength * 2;
      const buffer = new ArrayBuffer(44 + byteLength);
      const view = new DataView(buffer);
      writeAscii(view, 0, "RIFF");
      view.setUint32(4, 36 + byteLength, true);
      writeAscii(view, 8, "WAVE");
      writeAscii(view, 12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, recordedSampleRate, true);
      view.setUint32(28, recordedSampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeAscii(view, 36, "data");
      view.setUint32(40, byteLength, true);
      let offset = 44;
      for (const chunk of recordedChunks) {
        for (let i = 0; i < chunk.length; i++, offset += 2) view.setInt16(offset, chunk[i], true);
      }
      return new Blob([buffer], { type: "audio/wav" });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 30000);
    }

    function downloadRecording() {
      if (!recordedLength) return;
      downloadBlob(buildRecordedWavBlob(), `audio-airgap-recording-${Date.now()}.wav`);
    }

    function diagnosticSnapshot() {
      const { data, total } = targetData();
      return {
        time: new Date().toISOString(),
        config: currentConfig(),
        threshold: Number(els.threshold.value || "0.012"),
        searchMs: Number(els.searchMs.value || "120"),
        manifest: rx.manifest,
        validFrames: rx.validFrames,
        received: data.size,
        total,
        missing: missingList(),
        badSegments: rx.badSegments,
        recordedSampleRate,
        recordedSamples: recordedLength,
        recordedSeconds: recordedSampleRate ? recordedLength / recordedSampleRate : 0,
        statusLine: els.statusLine.textContent,
        log: els.log.textContent
      };
    }

    function downloadDiagnostics() {
      const json = JSON.stringify(diagnosticSnapshot(), null, 2);
      downloadBlob(new Blob([json], { type: "application/json" }), `audio-airgap-diagnostic-${Date.now()}.json`);
    }

    function rms(block) {
      let sum = 0;
      for (let i = 0; i < block.length; i++) sum += block[i] * block[i];
      return Math.sqrt(sum / Math.max(1, block.length));
    }

    function modulationActivity(block, cfg) {
      let targetPower = goertzelPower(block, 0, block.length, PILOT_HZ, cfg.sampleRate) * 1.5;
      for (let ch = 0; ch < cfg.channels; ch++) {
        for (let value = 0; value < 4; value++) {
          targetPower += goertzelPower(block, 0, block.length, cfg.plan[ch][value], cfg.sampleRate);
        }
      }
      const toneLevel = Math.sqrt(Math.max(0, targetPower)) / Math.max(1, block.length);
      const level = rms(block);
      return { level, toneLevel, score: toneLevel / (level + 0.000001) };
    }

    function updateAudioVisual(block, activity, isActive) {
      const pct = Math.max(0, Math.min(100, activity.toneLevel * 900));
      els.levelBar.style.width = `${pct.toFixed(1)}%`;
      els.levelMeter.classList.toggle("active", isActive);
      els.audioLevelText.textContent = isActive
        ? `检测到调制音，tone ${activity.toneLevel.toFixed(4)}，score ${activity.score.toFixed(2)}`
        : `等待调制音，tone ${activity.toneLevel.toFixed(4)}，score ${activity.score.toFixed(2)}`;

      const canvas = els.waveCanvas;
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#0f172a";
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = isActive ? "#2dd4bf" : "#94a3b8";
      ctx.lineWidth = 2;
      ctx.beginPath();
      const step = Math.max(1, Math.floor(block.length / w));
      for (let x = 0; x < w; x++) {
        const sample = block[Math.min(block.length - 1, x * step)] || 0;
        const y = h / 2 - sample * h * 0.42;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.strokeStyle = "rgba(255,255,255,.22)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, h / 2);
      ctx.lineTo(w, h / 2);
      ctx.stroke();
    }

    function appendSegment(block) {
      segment.push(block);
      segmentLength += block.length;
    }

    function finishActiveSegment() {
      if (!active || segmentLength <= 0) return;
      const minSegment = Math.round((audioContext ? audioContext.sampleRate : 48000) * 0.25);
      const finished = concatFloat32(segment, segmentLength);
      active = false;
      segment = [];
      segmentLength = 0;
      inactiveSamples = 0;
      if (finished.length >= minSegment) {
        const epoch = decodeEpoch;
        decoding = decoding.then(() => epoch === decodeEpoch ? decodeSegment(finished) : undefined).catch(err => logLine(String(err)));
      }
    }

    function processPending() {
      if (!audioContext) return;
      const blockSize = Math.max(64, Math.round(audioContext.sampleRate * BLOCK_MS / 1000));
      const endGap = Math.round(audioContext.sampleRate * END_GAP_MS / 1000);
      const threshold = Number(els.threshold.value || "0.012");
      const cfg = currentConfig();

      while (pendingLength >= blockSize) {
        const block = shiftPending(blockSize);
        const activity = modulationActivity(block, cfg);
        const isActive = activity.toneLevel >= threshold && activity.score >= 0.36;
        updateAudioVisual(block, activity, isActive);
        if (isActive) {
          if (!active) {
            active = true;
            segment = [];
            segmentLength = 0;
            inactiveSamples = 0;
          }
          appendSegment(block);
          inactiveSamples = 0;
        } else if (active) {
          appendSegment(block);
          inactiveSamples += block.length;
          if (inactiveSamples >= endGap) {
            finishActiveSegment();
          }
        }
      }
    }

    function goertzelPower(samples, start, n, freq, sampleRate) {
      const omega = 2 * Math.PI * freq / sampleRate;
      const coeff = 2 * Math.cos(omega);
      let q0 = 0, q1 = 0, q2 = 0;
      const end = Math.min(samples.length, start + n);
      for (let i = start; i < end; i++) {
        q0 = coeff * q1 - q2 + samples[i];
        q2 = q1;
        q1 = q0;
      }
      return q1 * q1 + q2 * q2 - coeff * q1 * q2;
    }

    function demodulateBytes(samples, dataStart, byteLimit, cfg) {
      const n = Math.round(cfg.sampleRate * cfg.symbolMs / 1000);
      const bytesPerSymbol = cfg.channels / 4;
      const symbolsNeeded = Math.ceil(byteLimit / bytesPerSymbol);
      const symbolsAvailable = Math.floor((samples.length - dataStart) / n);
      const symbolCount = Math.min(symbolsNeeded, symbolsAvailable);
      if (symbolCount <= 0) return new Uint8Array();

      const bits = [];
      for (let s = 0; s < symbolCount; s++) {
        const start = dataStart + s * n;
        for (let ch = 0; ch < cfg.channels; ch++) {
          let best = 0;
          let bestPower = -Infinity;
          for (let value = 0; value < 4; value++) {
            const power = goertzelPower(samples, start, n, cfg.plan[ch][value], cfg.sampleRate);
            if (power > bestPower) {
              bestPower = power;
              best = value;
            }
          }
          bits.push((best >> 1) & 1, best & 1);
        }
      }

      const byteCount = Math.floor(bits.length / 8);
      const out = new Uint8Array(byteCount);
      for (let i = 0; i < byteCount; i++) {
        let b = 0;
        for (let bit = 0; bit < 8; bit++) b = (b << 1) | bits[i * 8 + bit];
        out[i] = b;
      }
      return out;
    }

    function parseHeader(bytes) {
      if (bytes.length < 24) return null;
      for (let i = 0; i < 4; i++) if (bytes[i] !== MAGIC[i]) return null;
      if (bytes[4] !== VERSION) return null;
      const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
      const payloadLen = view.getUint16(18, false);
      const frameLen = 20 + payloadLen + 4;
      if (frameLen < 24 || frameLen > 4096) return null;
      return { frameLen, payloadLen };
    }

    function parseFrame(bytes) {
      const header = parseHeader(bytes);
      if (!header || bytes.length < header.frameLen) return null;
      const frame = bytes.subarray(0, header.frameLen);
      const view = new DataView(frame.buffer, frame.byteOffset, frame.byteLength);
      const expected = view.getUint32(header.frameLen - 4, false);
      const actual = crc32(frame.subarray(0, header.frameLen - 4));
      if (expected !== actual) return null;
      return {
        type: view.getUint8(5),
        fileId: Array.from(frame.subarray(6, 10)).map(b => b.toString(16).padStart(2, "0")).join("").toUpperCase(),
        index: view.getUint32(10, false),
        total: view.getUint32(14, false),
        payload: frame.subarray(20, header.frameLen - 4)
      };
    }

    function offsetsForSearch(sampleRate, searchMs) {
      const values = [0];
      const max = Math.round(sampleRate * searchMs / 1000);
      const step = Math.max(1, Math.round(sampleRate * 0.002));
      for (let delta = step; delta <= max; delta += step) values.push(delta, -delta);
      return values;
    }

    function percentile(values, p) {
      if (!values.length) return 0;
      const sorted = Array.from(values).sort((a, b) => a - b);
      const idx = Math.min(sorted.length - 1, Math.max(0, Math.round((sorted.length - 1) * p)));
      return sorted[idx];
    }

    function pilotCandidateStarts(samples, cfg) {
      const blockSize = Math.max(64, Math.round(cfg.sampleRate * 0.02));
      const blockCount = Math.floor(samples.length / blockSize);
      if (blockCount < 4) return [];
      const levels = [];
      for (let b = 0; b < blockCount; b++) {
        const start = b * blockSize;
        const power = goertzelPower(samples, start, blockSize, PILOT_HZ, cfg.sampleRate);
        levels.push(Math.sqrt(Math.max(0, power)) / blockSize);
      }
      const peak = percentile(levels, 0.98);
      const baseline = percentile(levels, 0.50);
      if (peak <= Math.max(0.008, baseline * 4)) return [];
      const gate = Math.max(peak * 0.45, baseline * 6);
      const minBlocks = Math.max(2, Math.round(cfg.sampleRate * 0.08 / blockSize));
      const pad = Math.round(cfg.sampleRate * 0.06);
      const starts = [];
      let runStart = null;
      for (let i = 0; i < levels.length; i++) {
        if (levels[i] >= gate && runStart === null) runStart = i;
        else if (levels[i] < gate && runStart !== null) {
          if (i - runStart >= minBlocks) starts.push(Math.max(0, runStart * blockSize - pad));
          runStart = null;
        }
      }
      if (runStart !== null && levels.length - runStart >= minBlocks) {
        starts.push(Math.max(0, runStart * blockSize - pad));
      }
      return Array.from(new Set(starts));
    }

    function tryDecodeOne(samples, cfg, searchMs) {
      const pilotSamples = Math.round(cfg.sampleRate * PILOT_MS / 1000);
      for (const offset of offsetsForSearch(cfg.sampleRate, searchMs)) {
        const start = pilotSamples + offset;
        if (start < 0 || start >= samples.length) continue;
        const headerBytes = demodulateBytes(samples, start, 24, cfg);
        const header = parseHeader(headerBytes);
        if (!header) continue;
        const fullBytes = demodulateBytes(samples, start, header.frameLen, cfg);
        const frame = parseFrame(fullBytes);
        if (frame) return frame;
      }
      return null;
    }

    async function decodeSegment(samples) {
      const cfg = currentConfig();
      const searchMs = Number(els.searchMs.value || "120");
      const starts = pilotCandidateStarts(samples, cfg);
      if (!starts.includes(0)) starts.unshift(0);
      let decoded = 0;
      for (const start of starts) {
        const frame = tryDecodeOne(samples.subarray(start), cfg, searchMs);
        if (frame) {
          acceptFrame(frame);
          decoded += 1;
        }
      }
      if (!decoded) {
        rx.badSegments += 1;
        updateUi();
      }
    }

    function currentConfig() {
      const channels = Number(els.channels.value);
      const symbolMs = Number(els.symbolMs.value);
      return {
        sampleRate: audioContext ? audioContext.sampleRate : 48000,
        channels,
        symbolMs,
        plan: tonePlan(channels)
      };
    }

    function acceptFrame(frame) {
      const key = `${frame.fileId}:${frame.type}:${frame.index}`;
      if (rx.seenFrameKeys.has(key)) {
        updateUi();
        return;
      }
      rx.seenFrameKeys.add(key);
      rx.validFrames += 1;
      if (frame.type === FRAME_MANIFEST) {
        const text = new TextDecoder().decode(frame.payload);
        rx.manifest = JSON.parse(text);
        logLine(`收到清单 ${rx.manifest.filename}，总片数=${rx.manifest.total}`);
      } else if (frame.type === FRAME_DATA) {
        if (!rx.dataByFile.has(frame.fileId)) rx.dataByFile.set(frame.fileId, new Map());
        rx.dataByFile.get(frame.fileId).set(frame.index, frame.payload.slice());
      }
      updateUi();
      maybeRecover();
    }

    function targetData() {
      if (!rx.manifest) return { fileId: null, data: new Map(), total: 0 };
      const fileId = String(rx.manifest.file_id).toUpperCase();
      return { fileId, data: rx.dataByFile.get(fileId) || new Map(), total: Number(rx.manifest.total || 0) };
    }

    function missingList() {
      const { data, total } = targetData();
      const missing = [];
      for (let i = 0; i < total; i++) if (!data.has(i)) missing.push(i);
      return missing;
    }

    function updateUi() {
      const { data, total } = targetData();
      const received = data.size;
      const missing = missingList();
      els.validFrames.textContent = String(rx.validFrames);
      els.received.textContent = `${received}/${total || 0}`;
      els.missingText.value = missing.join(" ");
      els.progressBar.style.width = total ? `${Math.min(100, received * 100 / total)}%` : "0%";
      if (!rx.manifest) {
        els.shaState.textContent = "-";
        els.shaState.className = "";
      }
      els.statusLine.textContent = rx.manifest
        ? `${rx.manifest.filename} | 缺失 ${missing.length} | 错误片段 ${rx.badSegments}`
        : `等待清单帧 | 错误片段 ${rx.badSegments}`;
      els.log.textContent = JSON.stringify({
        "已收到清单": !!rx.manifest,
        "有效帧": rx.validFrames,
        "已接收": received,
        "总片数": total,
        "缺失数量": missing.length,
        "错误片段": rx.badSegments,
        "采样率": audioContext ? audioContext.sampleRate : null
      }, null, 2);
    }

    async function maybeRecover() {
      if (!rx.manifest) return;
      const { data, total } = targetData();
      if (!total || data.size < total) return;
      const chunks = [];
      let size = 0;
      for (let i = 0; i < total; i++) {
        const chunk = data.get(i);
        if (!chunk) return;
        chunks.push(chunk);
        size += chunk.length;
      }
      const all = new Uint8Array(size);
      let offset = 0;
      for (const chunk of chunks) {
        all.set(chunk, offset);
        offset += chunk.length;
      }
      const expectedSize = Number(rx.manifest.size || all.length);
      const trimmed = all.subarray(0, expectedSize);
      const hash = await sha256Hex(trimmed);
      const ok = hash.toLowerCase() === String(rx.manifest.sha256).toLowerCase();
      els.shaState.textContent = ok ? "通过" : "失败";
      els.shaState.className = ok ? "ok" : "bad";
      if (rx.downloadUrl) URL.revokeObjectURL(rx.downloadUrl);
      const blob = new Blob([trimmed], { type: "application/octet-stream" });
      rx.downloadUrl = URL.createObjectURL(blob);
      els.downloadActions.innerHTML = "";
      const link = document.createElement("a");
      link.href = rx.downloadUrl;
      link.download = rx.manifest.filename || "recovered.bin";
      link.textContent = "下载文件";
      els.downloadActions.appendChild(link);
      logLine(`已恢复 sha256=${hash}，校验通过=${ok}`);
    }

    async function sha256Hex(bytes) {
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function logLine(text) {
      const current = els.log.textContent ? `${els.log.textContent}\n` : "";
      els.log.textContent = `${current}${new Date().toLocaleTimeString()} ${text}`.slice(-8000);
    }

    async function startRecording() {
      resetRuntimeBuffers();
      resetRecordingBuffer();
      stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
          channelCount: 1
        }
      });
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      recordedSampleRate = audioContext.sampleRate;
      const source = audioContext.createMediaStreamSource(stream);
      processor = audioContext.createScriptProcessor(4096, 1, 1);
      zeroGain = audioContext.createGain();
      zeroGain.gain.value = 0;
      processor.onaudioprocess = event => {
        const input = event.inputBuffer.getChannelData(0);
        recordInput(input);
        pushPending(input);
        processPending();
      };
      source.connect(processor);
      processor.connect(zeroGain);
      zeroGain.connect(audioContext.destination);
      els.startBtn.disabled = true;
      els.stopBtn.disabled = false;
      els.recordingState.textContent = "录音中";
      els.recordingState.className = "ok";
      updateUi();
    }

    async function stopRecording() {
      els.stopBtn.disabled = true;
      els.recordingState.textContent = "正在停止";
      decodeEpoch += 1;
      if (processor) processor.disconnect();
      if (zeroGain) zeroGain.disconnect();
      if (stream) stream.getTracks().forEach(track => track.stop());
      const ctx = audioContext;
      audioContext = null;
      stream = null;
      processor = null;
      zeroGain = null;
      resetRuntimeBuffers(false);
      if (ctx) {
        try {
          await ctx.close();
        } catch (_error) {
          // Some mobile browsers close an AudioContext asynchronously after input tracks stop.
        }
      }
      els.startBtn.disabled = false;
      els.stopBtn.disabled = true;
      els.recordingState.textContent = "待机";
      els.recordingState.className = "";
      els.audioLevelText.textContent = "无输入";
      els.levelBar.style.width = "0%";
      els.levelMeter.classList.remove("active");
      updateRecordingUi();
      updateUi();
    }
    function resetRuntimeBuffers(cancelDecoding = true) {
      pending = [];
      pendingLength = 0;
      active = false;
      segment = [];
      segmentLength = 0;
      inactiveSamples = 0;
      if (cancelDecoding) decodeEpoch += 1;
      decoding = Promise.resolve();
    }
    function resetState() {
      if (rx.downloadUrl) URL.revokeObjectURL(rx.downloadUrl);
      rx.manifest = null;
      rx.dataByFile = new Map();
      rx.validFrames = 0;
      rx.badSegments = 0;
      rx.seenFrameKeys = new Set();
      rx.downloadUrl = null;
      els.downloadActions.innerHTML = "";
      els.shaState.textContent = "-";
      els.shaState.className = "";
      resetRuntimeBuffers();
      updateUi();
    }

    els.startBtn.addEventListener("click", () => {
      els.startBtn.disabled = true;
      els.statusLine.textContent = "正在请求麦克风权限...";
      startRecording().catch(error => {
        els.statusLine.textContent = String(error);
        els.startBtn.disabled = false;
        els.stopBtn.disabled = true;
        resetRuntimeBuffers();
      });
    });
    els.stopBtn.addEventListener("click", () => { stopRecording().catch(error => { els.statusLine.textContent = String(error); }); });
    els.resetBtn.addEventListener("click", () => resetState());
    els.copyMissingBtn.addEventListener("click", async () => {
      await navigator.clipboard.writeText(els.missingText.value);
      els.statusLine.textContent = "缺片列表已复制。";
    });
    els.downloadRecordingBtn.addEventListener("click", downloadRecording);
    els.downloadDiagBtn.addEventListener("click", downloadDiagnostics);
    updateRecordingUi();
    updateUi();
  </script>
</body>
</html>
